        get('page/tunes').done(function(html) {
            var $html = $('<div>').html(html);
            var ids = [];
            tunes.forEach(function(t) {
                $html.find('.tune_title').each(function() {
                    if ($(this).text().trim() === t.tune_title) {
                        ids.push($(this).attr('id'));
                    }
                });
            });
            if (ids.length === 0) { log('  No previous tunes found', 'info'); callback(); return; }
            log('  Deleting ' + ids.length + ' previous tunes...', 'info');
            var deleted = 0;
            function next(i) {
                if (i >= ids.length) { log('  Done (' + deleted + ' deleted)', 'info'); callback(); return; }
                ensureAuth().then(function() {
                    post('api/remove-tune', { tune_id: ids[i] })
                    .done(function() { deleted++; next(i + 1); })
                    .fail(function() { next(i + 1); });
                });
            }
            next(0);
        }).fail(function() { callback(); });
    }

    function deleteTestUsersQuiet(i, callback) {
        if (i >= users.length) { callback(); return; }
        post('api/test-cleanup', { user_name: users[i].user_name })
        .always(function() { deleteTestUsersQuiet(i + 1, callback); });
    }

    function registerUsers(i) {
        if (i >= users.length) { log(''); loginAndCreateTunes(0); return; }
        var u = users[i];
        log('Registering ' + u.first_name + ' (' + u.user_name + ')...', 'running');
        post('api/register', $.extend({}, u, { register: true }))
        .done(function(d) { log('  ' + d.trim(), 'pass'); registerUsers(i + 1); })
        .fail(function() { log('  Failed', 'fail'); registerUsers(i + 1); });
    }

    function loginAndCreateTunes(i) {
        if (i >= tunes.length) { log(''); findTuneIds(); return; }
        var t = tunes[i];
        var userIdx = t.userIdx || 0;
        loginAs(users[userIdx]).done(function() {
            log('Adding tune: ' + t.tune_title + ' (' + t.tune_type + ', ' + t.tune_key + ') by ' + users[userIdx].first_name, 'running');
            post('api/add-tune', t)
            .done(function(d) { log('  ' + d.trim(), 'pass'); loginAndCreateTunes(i + 1); })
            .fail(function() { log('  Failed', 'fail'); loginAndCreateTunes(i + 1); });
        });
    }

    function findTuneIds() {
        log('Finding tune IDs...', 'running');
        get('page/tunes').done(function(html) {
            var $html = $('<div>').html(html);
            tuneIds = [];
            settingIds = [];
            tunes.forEach(function(t) {
                $html.find('.tune_title').each(function() {
                    if ($(this).text().trim() === t.tune_title) {
                        tuneIds.push($(this).attr('id'));
                        var sid = $(this).closest('tr').find('.show_abc').attr('id');
                        settingIds.push(sid);
                    }
                });
            });
            log('  Found ' + tuneIds.length + ' tunes: [' + tuneIds.join(', ') + ']', 'info');
            log('');
            addAltSettings(0);
        });
    }

    function addAltSettings(i) {
        if (i >= altSettings.length) { log(''); addFavorites(0, 0); return; }
        var alt = altSettings[i];
        // Find the tune_id for this alternate setting
        var tuneIdx = -1;
        for (var j = 0; j < tunes.length; j++) {
            if (tunes[j].tune_title === alt.tuneTitle) { tuneIdx = j; break; }
        }
        if (tuneIdx === -1 || !tuneIds[tuneIdx]) { addAltSettings(i + 1); return; }

        loginAs(users[alt.userIdx]).done(function() {
            log('Adding alt setting for "' + alt.tuneTitle + '" in ' + alt.tune_key + ' by ' + users[alt.userIdx].first_name, 'running');
            post('api/add-setting', {
                tune_id: tuneIds[tuneIdx],
                metre: alt.metre,
                tune_key: alt.tune_key,
                tempo: alt.tempo,
                tune_body: alt.tune_body
            })
            .done(function(d) { log('  Setting added (tune_id=' + tuneIds[tuneIdx] + ')', 'pass'); addAltSettings(i + 1); })
            .fail(function() { log('  Failed', 'fail'); addAltSettings(i + 1); });
        });
    }

    function addFavorites(userIdx, tuneIdx) {
        if (userIdx >= users.length) { log(''); createCollections(0); return; }
        if (tuneIdx >= favorites[userIdx].length) { addFavorites(userIdx + 1, 0); return; }

        var tidx = favorites[userIdx][tuneIdx];
        loginAs(users[userIdx]).done(function() {
            var tuneId = tuneIds[tidx];
            if (tuneIdx === 0) log(users[userIdx].first_name + ' favoriting tunes...', 'running');
            post('api/favorite-tune', { tune_id: tuneId })
            .done(function() {
                if (tuneIdx === favorites[userIdx].length - 1) log('  Added ' + favorites[userIdx].length + ' favorites', 'pass');
                addFavorites(userIdx, tuneIdx + 1);
            })
            .fail(function() { addFavorites(userIdx, tuneIdx + 1); });
        });
    }

    function createCollections(i) {
        if (i >= collections.length) { log(''); createThreads(0); return; }
        var c = collections[i];
        loginAs(users[c.userIdx]).done(function() {
            var cTuneIds = c.tuneIdxs.map(function(idx) { return tuneIds[idx]; }).filter(function(id) { return !!id; });
            log('Creating collection: ' + c.name + ' (' + cTuneIds.length + ' tunes)', 'running');
            post('api/create-collection-from-favorites', {
                collection_name: c.name, author: c.author, description: c.description,
                is_shared: c.is_shared, tune_ids: JSON.stringify(cTuneIds), remove_from_favorites: '0'
            })
            .done(function(r) {
                var result = (typeof r === 'string') ? JSON.parse(r) : r;
                log('  Created (id=' + result.collection_id + ')', 'pass');
                createCollections(i + 1);
            })
            .fail(function(xhr) {
                var errMsg = 'Unknown error (HTTP ' + xhr.status + ')';
                try {
                    var err = xhr.responseJSON || JSON.parse(xhr.responseText);
                    errMsg = err.error || errMsg;
                } catch(e) {}
                if (errMsg.indexOf('already exists') !== -1) {
                    log('  Already exists, skipping', 'info');
                } else {
                    log('  Failed: ' + errMsg, 'fail');
                }
                createCollections(i + 1);
            });
        });
    }

    function createThreads(i) {
        if (i >= threads.length) { log(''); createReplies(0); return; }
        var threadUserIdx = threads[i].userIdx !== undefined ? threads[i].userIdx : i;
        loginAs(users[threadUserIdx]).done(function() {
            log('Creating thread: "' + threads[i].title + '" by ' + users[threadUserIdx].first_name, 'running');
            post('api/create-thread', { title: threads[i].title, body: threads[i].body })
            .done(function(r) {
                var result = (typeof r === 'string') ? JSON.parse(r) : r;
                threadIds.push(result.thread_id);
                log('  Created (thread_id=' + result.thread_id + ')', 'pass');
                createThreads(i + 1);
            })
            .fail(function() { log('  Failed', 'fail'); createThreads(i + 1); });
        });
    }

    function createReplies(i) {
        if (i >= replies.length) { log(''); castVotes(0); return; }
        var r = replies[i];
        var threadId = threadIds[r.threadIdx];
        if (!threadId) {
            log(users[r.userIdx].first_name + ' replies to thread ' + r.threadIdx + ' — thread_id missing, skipping', 'fail');
            createReplies(i + 1);
            return;
        }
        loginAs(users[r.userIdx]).done(function(loginData) {
            log(users[r.userIdx].first_name + ' replies to "' + threads[r.threadIdx].title.substring(0, 30) + '..." (thread_id=' + threadId + ')', 'running');
            post('api/create-post', { thread_id: threadId, body: r.body })
            .done(function() { log('  Posted', 'pass'); createReplies(i + 1); })
            .fail(function(xhr) {
                var err = '';
                try { err = ': ' + (xhr.responseJSON || JSON.parse(xhr.responseText)).error; } catch(e) { err = ' (HTTP ' + xhr.status + ')'; }
                log('  Failed' + err, 'fail');
                createReplies(i + 1);
            });
        }).fail(function() {
            log(users[r.userIdx].first_name + ' — login failed', 'fail');
            createReplies(i + 1);
        });
    }

    function castVotes(i) {
        if (i >= votes.length) { log(''); finishCreate(); return; }
        var v = votes[i];
        loginAs(users[v[0]]).done(function() {
            var sid = settingIds[v[1]];
            if (!sid) { castVotes(i + 1); return; }
            var dir = v[2] > 0 ? 'upvotes' : 'downvotes';
            log(users[v[0]].first_name + ' ' + dir + ' "' + tunes[v[1]].tune_title + '"', 'running');
            post('api/vote-setting', { setting_id: sid, vote_value: v[2] })
            .done(function() { log('  Voted', 'pass'); castVotes(i + 1); })
            .fail(function() { log('  Failed', 'fail'); castVotes(i + 1); });
        });
    }

    function finishCreate() {
        log('══════════════════════════════════════════════════════════');
        log('  DONE — Test data created!', 'pass');
        log('══════════════════════════════════════════════════════════');
        log('');
        log('  Users:          ' + users.length, 'info');
        log('  Tunes:          ' + tunes.length, 'info');
        log('  Alt Settings:   ' + altSettings.length, 'info');
        log('  Favorites:      ' + favorites.reduce(function(a, b) { return a + b.length; }, 0), 'info');
        log('  Collections:    ' + collections.length, 'info');
        log('  Threads:        ' + threads.length, 'info');
        log('  Replies:        ' + replies.length, 'info');
        log('  Votes:          ' + votes.length, 'info');
        log('');
        log('  Login as any test user to browse:', 'info');
        users.forEach(function(u) {
            log('    ' + u.first_name + ': ' + u.user_name + ' / ' + u.password, 'info');
        });
    }

    // ══════════════════════════════════════════════════════════════════════════
    // DELETE
    // ══════════════════════════════════════════════════════════════════════════

    function deleteAll() {
        $('#results').empty();
        log('══════════════════════════════════════════════════════════');
        log('  DELETING TEST DATA');
        log('══════════════════════════════════════════════════════════');
        log('');

        // We need a logged-in user to perform deletions.
        // Try logging in as the first test user; if they're already deleted, register a temp one.
        ensureAuth().then(function() {
            deleteTestCollections(0);
        });
    }

    function ensureAuth() {
        return loginAs(users[0]).then(null, function() {
            // User doesn't exist — register a temp one
            return post('api/register', $.extend({}, users[0], { register: true }))
                .then(function() { return loginAs(users[0]); });
        });
    }

    function deleteTestCollections(i) {
        if (i >= collections.length) {
            log('');
            deleteTestTunes();
            return;
        }
        var collName = collections[i].name;
        log('Deleting collection "' + collName + '"...', 'running');
        // Use a server-side call to find and delete the collection by name
        get('page/collections').done(function(html) {
            var $html = $('<div>').html(html);
            // The collection cleanup is handled by the user cascade,
            // but we need to remove collection_tune links first for tunes owned by other users.
            // We'll handle this after deleting users.
            log('  Marked for cleanup', 'info');
            deleteTestCollections(i + 1);
        }).fail(function() {
            deleteTestCollections(i + 1);
        });
    }

    function deleteTestTunes() {
        log('Finding test tunes to delete...', 'running');
        get('page/tunes').done(function(html) {
            var $html = $('<div>').html(html);
            var tuneIdsToDelete = [];
            tunes.forEach(function(t) {
                $html.find('.tune_title').each(function() {
                    if ($(this).text().trim() === t.tune_title) {
                        tuneIdsToDelete.push($(this).attr('id'));
                    }
                });
            });

            if (tuneIdsToDelete.length === 0) {
                log('  No test tunes found', 'pass');
                log('');
                deleteTestUsers(0);
                return;
            }

            log('  Found ' + tuneIdsToDelete.length + ' test tunes, deleting...', 'info');
            deleteTestTune(tuneIdsToDelete, 0);
        }).fail(function() {
            log('  Could not load tunes page', 'fail');
            deleteTestUsers(0);
        });
    }

    function deleteTestTune(ids, i) {
        if (i >= ids.length) {
            log('  Deleted ' + ids.length + ' test tunes', 'pass');
            log('');
            deleteTestUsers(0);
            return;
        }
        // Re-auth before each delete to prevent session expiry
        ensureAuth().then(function() {
            post('api/remove-tune', { tune_id: ids[i] })
            .always(function() { deleteTestTune(ids, i + 1); });
        });
    }

    function deleteTestUsers(i) {
        if (i >= users.length) {
            // Final pass: verify collections are gone
            log('');
            verifyCleanup();
            return;
        }
        var u = users[i];
        log('Deleting user ' + u.first_name + '...', 'running');
        post('api/test-cleanup', { user_name: u.user_name })
        .done(function(d) { log('  ' + d.trim(), 'pass'); deleteTestUsers(i + 1); })
        .fail(function() { log('  Not found (already deleted)', 'info'); deleteTestUsers(i + 1); });
    }

    function verifyCleanup() {
        log('Verifying cleanup...', 'running');
        get('page/collections').done(function(html) {
            var $html = $('<div>').html(html);
            var remaining = [];
            collections.forEach(function(c) {
                $html.find('.collection-title').each(function() {
                    if ($(this).text().trim() === c.name) {
                        remaining.push(c.name);
                    }
                });
            });
            if (remaining.length === 0) {
                log('  All test collections removed', 'pass');
            } else {
                log('  ' + remaining.length + ' test collection(s) still remain: ' + remaining.join(', '), 'fail');
            }

            get('page/tunes').done(function(html2) {
                var $html2 = $('<div>').html(html2);
                var remainingTunes = [];
                tunes.forEach(function(t) {
                    $html2.find('.tune_title').each(function() {
                        if ($(this).text().trim() === t.tune_title) {
                            remainingTunes.push(t.tune_title);
                        }
                    });
                });
                if (remainingTunes.length === 0) {
                    log('  All test tunes removed', 'pass');
                } else {
                    log('  ' + remainingTunes.length + ' test tune(s) still remain', 'fail');
                }
                log('');
                finishDelete();
            }).fail(function() { finishDelete(); });
        }).fail(function() { finishDelete(); });
    }

    function finishDelete() {
        log('Resetting auto-increment counters...', 'running');
        post('api/test-reset-ids', {})
        .done(function(d) {
            log('  ' + d.trim(), 'pass');
        })
        .fail(function() {
            log('  Failed to reset auto-increments', 'fail');
        })
        .always(function() {
            log('');
            log('══════════════════════════════════════════════════════════');
            log('  DONE — Test data deleted!', 'pass');
            log('══════════════════════════════════════════════════════════');
        });
    }

    $('#create-btn').on('click', createAll);
    $('#delete-btn').on('click', deleteAll);

    </script>
</body>
