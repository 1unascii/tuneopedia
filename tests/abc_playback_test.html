<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>abc_editor.js — Key Playback Tests</title>
    <style>
        body { font-family: monospace; padding: 2em; background: #1e1e1e; color: #d4d4d4; }
        h1   { color: #9cdcfe; }
        h2   { color: #569cd6; margin-top: 2em; }
        .pass { color: #4ec9b0; }
        .fail { color: #f44747; }
        .summary { font-size: 1.2em; margin-top: 2em; border-top: 1px solid #444; padding-top: 1em; }
        table { border-collapse: collapse; margin-top: 0.5em; }
        td, th { padding: 0.3em 1.2em 0.3em 0; text-align: left; }
        th { color: #c586c0; }
    </style>

    <!-- jQuery is required by abc_editor.js -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <!--
        Load abc_editor.js directly.  keySpecificPlayback() is defined at global
        scope in that file so it can be called here without waiting for DOM ready.
        The $(document).ready() block inside abc_editor.js exits early when #abc
        is not present, so no DOM-related errors occur on this test page.
    -->
    <script src="../js/abc_editor.js"></script>
</head>
<body>
<h1>abc_editor.js — Key Playback Tests</h1>

<script>

    // ── Test runner ───────────────────────────────────────────────────────────

    var passed = 0;
    var failed = 0;
    var results = [];

    function assertEquals(description, expected, actual) {
        var ok = (expected === actual);
        if (ok) { passed++; } else { failed++; }
        results.push({ description: description, expected: expected, actual: actual, ok: ok });
    }

    // ── Tests ─────────────────────────────────────────────────────────────────

    // B Mixolydian: sharpKeysArrayGlobal index 4 — 4 sharps in order F C G D
    assertEquals('B Mixolydian: F should be sharp',  '^F', keySpecificPlayback('B Mixolydian', 'F'));
    assertEquals('B Mixolydian: C should be sharp',  '^C', keySpecificPlayback('B Mixolydian', 'C'));
    assertEquals('B Mixolydian: G should be sharp',  '^G', keySpecificPlayback('B Mixolydian', 'G'));
    assertEquals('B Mixolydian: D should be sharp',  '^D', keySpecificPlayback('B Mixolydian', 'D'));
    assertEquals('B Mixolydian: A should be natural', 'A', keySpecificPlayback('B Mixolydian', 'A'));
    assertEquals('B Mixolydian: E should be natural', 'E', keySpecificPlayback('B Mixolydian', 'E'));
    assertEquals('B Mixolydian: B should be natural', 'B', keySpecificPlayback('B Mixolydian', 'B'));

    // Ab Mixolydian: flatKeysArrayGlobal index 5 — 5 flats in order B E A D G
    assertEquals('Ab Mixolydian: D should be flat',  '_D', keySpecificPlayback('Ab Mixolydian', 'D'));
    assertEquals('Ab Mixolydian: B should be flat',  '_B', keySpecificPlayback('Ab Mixolydian', 'B'));
    assertEquals('Ab Mixolydian: E should be flat',  '_E', keySpecificPlayback('Ab Mixolydian', 'E'));
    assertEquals('Ab Mixolydian: A should be flat',  '_A', keySpecificPlayback('Ab Mixolydian', 'A'));
    assertEquals('Ab Mixolydian: G should be flat',  '_G', keySpecificPlayback('Ab Mixolydian', 'G'));
    assertEquals('Ab Mixolydian: C should be natural', 'C', keySpecificPlayback('Ab Mixolydian', 'C'));
    assertEquals('Ab Mixolydian: F should be natural', 'F', keySpecificPlayback('Ab Mixolydian', 'F'));

    // C major / D dorian / G Mixolydian / A minor — all natural (index 0, no accidentals)
    assertEquals('C major: C should be natural',     'C',  keySpecificPlayback('C', 'C'));
    assertEquals('C major: F should be natural',     'F',  keySpecificPlayback('C', 'F'));
    assertEquals('D dorian: F should be natural',    'F',  keySpecificPlayback('D dorian', 'F'));
    assertEquals('A minor: G should be natural',     'G',  keySpecificPlayback('A minor', 'G'));

    // G major: one sharp (F)
    assertEquals('G major: F should be sharp',       '^F', keySpecificPlayback('G', 'F'));
    assertEquals('G major: f should be sharp',       '^f', keySpecificPlayback('G', 'f'));
    assertEquals('G major: C should be natural',     'C',  keySpecificPlayback('G', 'C'));

    // D major: two sharps (F C)
    assertEquals('D major: F should be sharp',       '^F', keySpecificPlayback('D', 'F'));
    assertEquals('D major: C should be sharp',       '^C', keySpecificPlayback('D', 'C'));
    assertEquals('D major: G should be natural',     'G',  keySpecificPlayback('D', 'G'));

    // Bb major: two flats (B E)
    assertEquals('Bb major: B should be flat',       '_B', keySpecificPlayback('Bb', 'B'));
    assertEquals('Bb major: E should be flat',       '_E', keySpecificPlayback('Bb', 'E'));
    assertEquals('Bb major: F should be natural',    'F',  keySpecificPlayback('Bb', 'F'));

    // F dorian: flatKeysArrayGlobal index 3 — 3 flats in order B E A
    assertEquals('F dorian: B should be flat',       '_B', keySpecificPlayback('F dorian', 'B'));
    assertEquals('F dorian: E should be flat',       '_E', keySpecificPlayback('F dorian', 'E'));
    assertEquals('F dorian: A should be flat',       '_A', keySpecificPlayback('F dorian', 'A'));
    assertEquals('F dorian: D should be natural',    'D',  keySpecificPlayback('F dorian', 'D'));
    assertEquals('F dorian: G should be natural',    'G',  keySpecificPlayback('F dorian', 'G'));

    // E dorian: sharpKeysArrayGlobal index 2 — 2 sharps (F C)
    assertEquals('E dorian: F should be sharp',      '^F', keySpecificPlayback('E dorian', 'F'));
    assertEquals('E dorian: C should be sharp',      '^C', keySpecificPlayback('E dorian', 'C'));
    assertEquals('E dorian: G should be natural',    'G',  keySpecificPlayback('E dorian', 'G'));

    // ── Render results ────────────────────────────────────────────────────────

    var html = '<table><tr><th>Test</th><th>Expected</th><th>Actual</th><th>Result</th></tr>';
    for (var i = 0; i < results.length; i++) {
        var r = results[i];
        var status = r.ok ? '<span class="pass">PASS</span>' : '<span class="fail">FAIL</span>';
        html += '<tr>'
            + '<td>' + r.description + '</td>'
            + '<td>' + r.expected + '</td>'
            + '<td>' + r.actual   + '</td>'
            + '<td>' + status     + '</td>'
            + '</tr>';
    }
    html += '</table>';
    document.write(html);

    var summaryClass = (failed === 0) ? 'pass' : 'fail';
    document.write('<p class="summary ' + summaryClass + '">'
        + passed + ' passed, ' + failed + ' failed'
        + '</p>');

</script>
</body>
</html>
