<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ABC Playback Unit Tests</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="../public/js/modules/abc-editor.js"></script>
    <style>
        body { font-family: monospace; padding: 2em; background: #1e1e1e; color: #d4d4d4; }
        h1   { color: #9cdcfe; }
        h2   { color: #569cd6; margin-top: 2em; }
        .pass { color: #4ec9b0; }
        .fail { color: #f44747; }
        .code { color: #aaa; background: #2a2a2a; padding: 2px 6px; border-radius: 3px; }
        .summary { font-size: 1.2em; margin-top: 2em; border-top: 1px solid #444; padding-top: 1em; }
        table { border-collapse: collapse; margin-top: 0.5em; }
        td, th { padding: 0.3em 1.2em 0.3em 0; text-align: left; }
        th { color: #c586c0; }
        #results { white-space: pre-wrap; line-height: 1.8; }
        button { padding: 8px 20px; font-size: 1em; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>
<h1>ABC Playback Unit Tests</h1>
<button id="run-tests">Run All Tests</button>
<div id="results"></div>

<script>

    var passed = 0;
    var failed = 0;

    function log(msg, cls) {
        $('#results').append('<div class="' + (cls || '') + '">' + msg + '</div>');
    }

    function code(snippet) {
        return '<span class="code">' + snippet + '</span>';
    }

    // ══════════════════════════════════════════════════════════════════════════
    // PART 1: keySpecificPlayback unit tests
    // ══════════════════════════════════════════════════════════════════════════

    function runKeyPlaybackTests() {
        log('══════════════════════════════════════════════════════════');
        log('  keySpecificPlayback() — key signature accidentals');
        log('══════════════════════════════════════════════════════════');
        log('');

        var tests = [
            // C major — no accidentals
            ['C', 'C', 'C', 'C major: C natural'],
            ['C', 'F', 'F', 'C major: F natural'],
            ['C', 'G', 'G', 'C major: G natural'],

            // G major — 1 sharp (F)
            ['G', 'F', '^F', 'G major: F sharp'],
            ['G', 'f', '^f', 'G major: f sharp (lowercase)'],
            ['G', 'C', 'C',  'G major: C natural'],

            // D major — 2 sharps (F C)
            ['D', 'F', '^F', 'D major: F sharp'],
            ['D', 'C', '^C', 'D major: C sharp'],
            ['D', 'G', 'G',  'D major: G natural'],

            // A major — 3 sharps (F C G)
            ['A', 'F', '^F', 'A major: F sharp'],
            ['A', 'G', '^G', 'A major: G sharp'],
            ['A', 'D', 'D',  'A major: D natural'],

            // E major — 4 sharps (F C G D)
            ['E', 'D', '^D', 'E major: D sharp'],
            ['E', 'A', 'A',  'E major: A natural'],

            // B major — 5 sharps (F C G D A)
            ['B', 'A', '^A', 'B major: A sharp'],
            ['B', 'E', 'E',  'B major: E natural'],

            // F# major — 6 sharps (F C G D A E)
            ['F#', 'E', '^E', 'F# major: E sharp'],
            ['F#', 'B', 'B',  'F# major: B natural'],

            // C# major — 7 sharps (F C G D A E B)
            ['C#', 'B', '^B', 'C# major: B sharp'],

            // F major — 1 flat (B)
            ['F', 'B', '_B', 'F major: B flat'],
            ['F', 'b', '_b', 'F major: b flat (lowercase)'],
            ['F', 'E', 'E',  'F major: E natural'],

            // Bb major — 2 flats (B E)
            ['Bb', 'B', '_B', 'Bb major: B flat'],
            ['Bb', 'E', '_E', 'Bb major: E flat'],
            ['Bb', 'F', 'F',  'Bb major: F natural'],

            // Eb major — 3 flats (B E A)
            ['Eb', 'A', '_A', 'Eb major: A flat'],
            ['Eb', 'D', 'D',  'Eb major: D natural'],

            // Ab major — 4 flats (B E A D)
            ['Ab', 'D', '_D', 'Ab major: D flat'],
            ['Ab', 'G', 'G',  'Ab major: G natural'],

            // Db major — 5 flats (B E A D G)
            ['Db', 'G', '_G', 'Db major: G flat'],
            ['Db', 'C', 'C',  'Db major: C natural'],

            // D dorian — no accidentals (same as C major)
            ['D dorian', 'F', 'F', 'D dorian: F natural'],
            ['D dorian', 'C', 'C', 'D dorian: C natural'],

            // E dorian — 2 sharps (F C)
            ['E dorian', 'F', '^F', 'E dorian: F sharp'],
            ['E dorian', 'C', '^C', 'E dorian: C sharp'],

            // A minor — no accidentals
            ['A minor', 'G', 'G', 'A minor: G natural'],
            ['A minor', 'F', 'F', 'A minor: F natural'],

            // E minor — 1 sharp (F)
            ['E minor', 'F', '^F', 'E minor: F sharp'],
            ['E minor', 'C', 'C',  'E minor: C natural'],

            // D minor — 1 flat (B)
            ['D minor', 'B', '_B', 'D minor: B flat'],
            ['D minor', 'E', 'E',  'D minor: E natural'],

            // G Mixolydian — no accidentals
            ['G Mixolydian', 'F', 'F', 'G Mixolydian: F natural'],

            // D Mixolydian — 1 sharp (F)
            ['D Mixolydian', 'F', '^F', 'D Mixolydian: F sharp'],
            ['D Mixolydian', 'C', 'C',  'D Mixolydian: C natural'],

            // B Mixolydian — 4 sharps (F C G D)
            ['B Mixolydian', 'F', '^F', 'B Mixolydian: F sharp'],
            ['B Mixolydian', 'D', '^D', 'B Mixolydian: D sharp'],
            ['B Mixolydian', 'A', 'A',  'B Mixolydian: A natural'],

            // F dorian — 3 flats (B E A)
            ['F dorian', 'B', '_B', 'F dorian: B flat'],
            ['F dorian', 'A', '_A', 'F dorian: A flat'],
            ['F dorian', 'D', 'D',  'F dorian: D natural'],
        ];

        var html = '<table><tr><th>Test</th><th>Key</th><th>Input</th><th>Expected</th><th>Actual</th><th>Result</th></tr>';
        tests.forEach(function(t) {
            var actual = keySpecificPlayback(t[0], t[1]);
            var ok = (actual === t[2]);
            if (ok) { passed++; } else { failed++; }
            var status = ok ? '<span class="pass">PASS</span>' : '<span class="fail">FAIL</span>';
            html += '<tr><td>' + t[3] + '</td><td>' + t[0] + '</td><td>' + t[1] + '</td><td>' + t[2] + '</td><td>' + actual + '</td><td>' + status + '</td></tr>';
        });
        html += '</table>';
        $('#results').append(html);
        log('');
    }

    // ══════════════════════════════════════════════════════════════════════════
    // PART 2: abcToMidi pitch mapping tests
    // ══════════════════════════════════════════════════════════════════════════

    function runAbcToMidiTests() {
        log('══════════════════════════════════════════════════════════');
        log('  abcToMidi() — ABC note to MIDI pitch mapping');
        log('══════════════════════════════════════════════════════════');
        log('');

        function abcToMidi(abc) {
            var noteMap = { 'C': 60, 'D': 62, 'E': 64, 'F': 65, 'G': 67, 'A': 69, 'B': 71 };
            var i = 0, acc = 0;
            while (i < abc.length) {
                if (abc[i] === '^') { acc++; i++; }
                else if (abc[i] === '_') { acc--; i++; }
                else if (abc[i] === '=') { i++; }
                else break;
            }
            if (i >= abc.length) return 60;
            var ch = abc[i];
            var isLower = (ch === ch.toLowerCase());
            var base = noteMap[ch.toUpperCase()];
            if (base === undefined) return 60;
            var pitch = isLower ? base + 12 : base;
            pitch += acc;
            i++;
            while (i < abc.length) {
                if (abc[i] === ',') { pitch -= 12; i++; }
                else if (abc[i] === "'") { pitch += 12; i++; }
                else break;
            }
            return pitch;
        }

        var tests = [
            // Basic notes — uppercase = octave 4 (middle C octave), lowercase = octave 5
            ['C',   60, 'C = middle C (MIDI 60)'],
            ['D',   62, 'D'],
            ['E',   64, 'E'],
            ['F',   65, 'F'],
            ['G',   67, 'G'],
            ['A',   69, 'A'],
            ['B',   71, 'B'],
            ['c',   72, 'c (octave above middle C)'],
            ['d',   74, 'd'],
            ['e',   76, 'e'],
            ['f',   77, 'f'],
            ['g',   79, 'g'],
            ['a',   81, 'a'],
            ['b',   83, 'b'],

            // Single accidentals
            ['^F',  66, '^F (F sharp)'],
            ['_B',  70, '_B (B flat)'],
            ['=F',  65, '=F (F natural)'],
            ['^c',  73, '^c (c sharp)'],
            ['_e',  75, '_e (e flat)'],

            // Double accidentals
            ['^^F', 67, '^^F (F double sharp)'],
            ['__B', 69, '__B (B double flat)'],
            ['^^c', 74, '^^c (c double sharp)'],

            // Single octave modifiers
            ['C,',  48, 'C, (one octave down)'],
            ["c'",  84, "c' (one octave up)"],
            ['G,',  55, 'G, (one octave down)'],
            ["g'",  91, "g' (one octave up)"],

            // Double octave modifiers
            ['C,,',  36, 'C,, (two octaves down)'],
            ["c''",  96, "c'' (two octaves up)"],

            // Triple octave modifiers
            ['C,,,',  24, 'C,,, (three octaves down)'],
            ["c'''", 108, "c''' (three octaves up)"],

            // Quadruple octave modifiers
            ['C,,,,', 12, 'C,,,, (four octaves down)'],
            ["c''''", 120, "c'''' (four octaves up)"],

            // Accidentals with octave modifiers
            ['^F,',  54, '^F, (F sharp, one octave down)'],
            ["_b'",  94, "_b' (b flat, one octave up)"],
            ['^^G,', 57, '^^G, (G double sharp, one octave down)'],
            ["^^g'", 93, "^^g' (g double sharp, one octave up)"],
            ['__B,', 57, '__B, (B double flat, one octave down)'],

            // Accidentals with multiple octave modifiers
            ['^F,,',  42, '^F,, (F sharp, two octaves down)'],
            ["_b''", 106, "_b'' (b flat, two octaves up)"],
            ['^^C,,,', 26, '^^C,,, (C double sharp, three octaves down)'],
        ];

        var html = '<table><tr><th>Test</th><th>ABC</th><th>Expected MIDI</th><th>Actual MIDI</th><th>Result</th></tr>';
        tests.forEach(function(t) {
            var actual = abcToMidi(t[0]);
            var ok = (actual === t[1]);
            if (ok) { passed++; } else { failed++; }
            var status = ok ? '<span class="pass">PASS</span>' : '<span class="fail">FAIL</span>';
            html += '<tr><td>' + t[2] + '</td><td>' + code(t[0]) + '</td><td>' + t[1] + '</td><td>' + actual + '</td><td>' + status + '</td></tr>';
        });
        html += '</table>';
        $('#results').append(html);
        log('');
    }

    // ══════════════════════════════════════════════════════════════════════════
    // PART 3: playNote input validation tests
    // ══════════════════════════════════════════════════════════════════════════

    function runPlayNoteValidationTests() {
        log('══════════════════════════════════════════════════════════');
        log('  playNote() — input validation (play / silent / thud)');
        log('══════════════════════════════════════════════════════════');
        log('');

        var abcSilentChars = /^[tTHLMvuz|:~.\/<>!+\[\](){} 0-9\-\t\n\r]$/;

        function classifyNote(abcNoteStr) {
            if (!abcNoteStr) return 'skip';
            var noteChar = abcNoteStr.replace(/[\^_=]/g, '').charAt(0);
            if (/^[A-Ga-g]$/.test(noteChar)) return 'play';
            if (abcSilentChars.test(noteChar)) return 'silent';
            return 'thud';
        }

        var tests = [
            // Valid notes — should play
            ['C',     'play',   'C = valid note'],
            ['c',     'play',   'c = valid note (lowercase)'],
            ['^F',    'play',   '^F = accidental note'],
            ['_B',    'play',   '_B = flat note'],
            ['=G',    'play',   '=G = natural note'],
            ['^^c',   'play',   '^^c = double sharp'],
            ['__E',   'play',   '__E = double flat'],
            ["d'",    'play',   "d' = note with octave up"],
            ['G,,',   'play',   'G,, = note with double octave down'],
            ["^^f'",  'play',   "^^f' = double sharp with octave up"],

            // Ornaments & articulations — should be silent
            ['T',     'silent', 'T = trill (uppercase)'],
            ['t',     'silent', 't = trill (lowercase)'],
            ['H',     'silent', 'H = fermata'],
            ['L',     'silent', 'L = accent'],
            ['M',     'silent', 'M = mordent'],
            ['v',     'silent', 'v = down-bow'],
            ['u',     'silent', 'u = up-bow'],
            ['~',     'silent', '~ = roll/ornament'],

            // Structural & rhythmic — should be silent
            ['z',     'silent', 'z = rest'],
            ['|',     'silent', '| = bar line'],
            [':',     'silent', ': = repeat marker'],
            ['.',     'silent', '. = staccato/dot'],
            ['/',     'silent', '/ = duration modifier'],
            ['<',     'silent', '< = broken rhythm'],
            ['>',     'silent', '> = broken rhythm'],
            ['(',     'silent', '( = slur/tuplet start'],
            [')',     'silent', ') = slur end'],
            ['[',     'silent', '[ = chord start'],
            [']',     'silent', '] = chord end'],
            ['{',     'silent', '{ = grace note start'],
            ['}',     'silent', '} = grace note end'],
            ['-',     'silent', '- = tie'],
            ['!',     'silent', '! = decoration delimiter'],
            ['+',     'silent', '+ = decoration delimiter'],

            // Numbers — should be silent
            ['0',     'silent', '0 = duration number'],
            ['1',     'silent', '1 = duration number'],
            ['2',     'silent', '2 = duration number'],
            ['3',     'silent', '3 = duration number'],
            ['4',     'silent', '4 = duration number'],
            ['8',     'silent', '8 = duration number'],

            // Whitespace — should be silent
            [' ',     'silent', 'space = whitespace'],

            // Invalid characters — should thud
            ['x',     'thud',   'x = invalid character'],
            ['q',     'thud',   'q = invalid character'],
            ['w',     'thud',   'w = invalid character'],
            ['r',     'thud',   'r = invalid character'],
            ['i',     'thud',   'i = invalid character'],
            ['j',     'thud',   'j = invalid character'],
            ['k',     'thud',   'k = invalid character'],
            ['n',     'thud',   'n = invalid character'],
            ['o',     'thud',   'o = invalid character'],
            ['p',     'thud',   'p = invalid character'],
            ['s',     'thud',   's = invalid character'],
            ['y',     'thud',   'y = invalid character'],
            ['@',     'thud',   '@ = invalid character'],
            ['#',     'thud',   '# = invalid character'],
            ['$',     'thud',   '$ = invalid character'],
            ['&',     'thud',   '& = invalid character'],
            ['*',     'thud',   '* = invalid character'],

            // Edge cases
            ['',      'skip',   'empty string = skip'],
        ];

        var html = '<table><tr><th>Test</th><th>Input</th><th>Expected</th><th>Actual</th><th>Result</th></tr>';
        tests.forEach(function(t) {
            var actual = classifyNote(t[0]);
            var ok = (actual === t[1]);
            if (ok) { passed++; } else { failed++; }
            var status = ok ? '<span class="pass">PASS</span>' : '<span class="fail">FAIL</span>';
            html += '<tr><td>' + t[2] + '</td><td>' + code(t[0] || '(empty)') + '</td><td>' + t[1] + '</td><td>' + actual + '</td><td>' + status + '</td></tr>';
        });
        html += '</table>';
        $('#results').append(html);
        log('');
    }

    // ══════════════════════════════════════════════════════════════════════════
    // Summary
    // ══════════════════════════════════════════════════════════════════════════

    function showSummary() {
        var total = passed + failed;
        log('══════════════════════════════════════════════════════════');
        if (failed === 0) {
            log('All ' + total + ' assertions passed', 'pass');
        } else {
            log(passed + '/' + total + ' passed, ' + failed + ' failed', 'fail');
        }
    }

    $('#run-tests').on('click', function() {
        $('#results').empty();
        passed = 0;
        failed = 0;
        runKeyPlaybackTests();
        runAbcToMidiTests();
        runPlayNoteValidationTests();
        showSummary();
    });

</script>
</body>
</html>
